upstream agentshield_backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Dashboard static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location ~ ^/(api|proxy|health|docs|openapi.json|metrics)/ {
        proxy_pass http://agentshield_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # SSE / streaming — disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Exact path matches for top-level backend routes
    location ~ ^/(health|docs|openapi\.json|redoc|metrics)$ {
        proxy_pass http://agentshield_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Max upload size
    client_max_body_size 10M;
}
